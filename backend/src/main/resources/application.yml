server:
  port: 8080

spring:
  application:
    name: ai-demo-backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  sql:
    init:
      mode: never
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ai-demo-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

ai:
  api-key: ${AI_API_KEY}
  base-url: https://openrouter.ai/api/v1
  timeout: 60000
  default-model: nvidia/nemotron-3-super-120b-a12b:free
  max-tokens: 2000
  temperature: 0.7
  model-list:
    - nvidia/nemotron-3-super-120b-a12b:free

file:
  upload-path: ./uploads
